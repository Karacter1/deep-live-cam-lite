name: huggingface-ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hf-stack:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN || vars.HF_TOKEN }}
      INSTALL_GPU: ${{ secrets.INSTALL_GPU || vars.INSTALL_GPU || '0' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-hf.txt

      - name: Install GPU packages
        if: env.INSTALL_GPU == '1'
        run: |
          python -m pip install -r requirements-gpu.txt

      - name: Verify Hugging Face stack imports
        run: |
          python - <<'PY'
          import importlib
          for name in ["huggingface_hub", "transformers", "diffusers", "accelerate", "safetensors"]:
              importlib.import_module(name)
          print("Hugging Face runtime imports succeeded")
          PY

      - name: Log in to Hugging Face Hub
        if: ${{ env.HF_TOKEN != '' }}
        run: |
          huggingface-cli login --token "$HF_TOKEN" --add-to-git-credential

      - name: Confirm Hugging Face login status
        if: ${{ env.HF_TOKEN != '' }}
        run: |
          huggingface-cli whoami
