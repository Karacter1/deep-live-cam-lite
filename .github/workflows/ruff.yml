name: ruff

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: python -m pip install --upgrade pip ruff==0.15.7
      - name: Run Ruff
        run: ruff check deep-live-cam-lite --output-format=github
